name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: write

jobs:
  build:
    name: build-and-test
    runs-on: macos-15
    env:
      destination: ${{ 'platform=iOS Simulator,OS=26.2,name=iPhone 17 Pro' }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}
          fetch-depth: 0

      - name: Select Xcode 26
        shell: bash
        run: |
          sudo xcode-select -s /Applications/Xcode_26.2.app
          XCODE_PATH="$(xcode-select -p)"
          echo "Using Xcode at ${XCODE_PATH}"
          xcodebuild -version


      - name: Accept Xcode license & runFirstLaunch
        run: |
          # tolerate failures so the job continues if already accepted
          sudo xcodebuild -license accept || true
          sudo xcodebuild -runFirstLaunch || true

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        run: |
          swiftlint lint

      - name: Build
        run: |
          xcodebuild build-for-testing -scheme "Demo" -workspace FinniversKit.xcworkspace -destination "$destination"
          xcodebuild build-for-testing -scheme "SnapshotTests" -workspace FinniversKit.xcworkspace -destination "$destination"

      - name: Unit Tests
        run: |
          xcodebuild test-without-building -scheme "Demo" -workspace FinniversKit.xcworkspace -destination "$destination" -only-testing:UnitTests

      - name: Snapshot Tests
        id: snapshot_tests
        continue-on-error: true
        run: |
          xcodebuild test-without-building -scheme "SnapshotTests" -workspace FinniversKit.xcworkspace -destination "$destination"

      - name: Record Snapshots (on failure)
        if: steps.snapshot_tests.outcome == 'failure' && github.event_name == 'pull_request'
        env:
          SNAPSHOT_RECORD: "1"
        run: |
          xcodebuild test-without-building -scheme "SnapshotTests" -workspace FinniversKit.xcworkspace -destination "$destination" || true

      - name: Commit Updated Snapshots
        if: steps.snapshot_tests.outcome == 'failure' && github.event_name == 'pull_request'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add Demo/SnapshotTests/__Snapshots__
          if git diff --staged --quiet; then
            echo "No snapshot changes to commit"
          else
            git commit -m "Update snapshot references from CI"
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Fail if Snapshots Were Updated
        if: steps.snapshot_tests.outcome == 'failure'
        run: |
          echo "Snapshot tests failed. New snapshots have been recorded and committed to your branch."
          echo "Please pull the latest changes and verify the updated snapshots."
          exit 1
