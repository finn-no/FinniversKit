name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    name: build-and-test
    runs-on: macos-26
    env:
      destination: ${{ 'platform=iOS Simulator,OS=26.2,name=iPhone 17 Pro' }}

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        shell: bash
        run: |
          sudo xcode-select -s /Applications/Xcode_26.2.app
          XCODE_PATH="$(xcode-select -p)"
          echo "Using Xcode at ${XCODE_PATH}"
          xcodebuild -version


      - name: Accept Xcode license & runFirstLaunch
        run: |
          # tolerate failures so the job continues if already accepted
          sudo xcodebuild -license accept || true
          sudo xcodebuild -runFirstLaunch || true

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        run: |
          swiftlint lint

      - name: Build
        run: |
          xcodebuild build-for-testing -scheme "Demo" -workspace FinniversKit.xcworkspace -destination "$destination"
          xcodebuild build-for-testing -scheme "SnapshotTests" -workspace FinniversKit.xcworkspace -destination "$destination"

      - name: Unit Tests
        run: |
          xcodebuild test-without-building -scheme "Demo" -workspace FinniversKit.xcworkspace -destination "$destination" -only-testing:UnitTests

      - name: Snapshot Tests
        run: |
          xcodebuild test-without-building -scheme "SnapshotTests" -workspace FinniversKit.xcworkspace -destination "$destination" 
